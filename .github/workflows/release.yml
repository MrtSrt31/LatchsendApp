name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app (standalone)
        run: npx next build

      - name: Copy release files
        shell: bash
        run: |
          mkdir dist
          cp -r .next/standalone dist/
          cp -r public dist/
          cp -r prisma dist/
          cp signaling-server.js dist/
          cp package.json dist/
          cp .env.example dist/
          cp start.sh dist/ || :
          cp start.bat dist/ || :

      - name: Archive release
        uses: actions/upload-artifact@v4
        with:
          name: latchsend-${{ matrix.os }}
          path: dist/

  release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          body: |
            ## Latchsend Release ${{ github.ref_name }}
            - Multi-platform standalone builds for Linux, macOS, and Windows
            - Docker image and Compose setup included
            - See .env.example for configuration
            - Use start.sh (Linux/macOS) or start.bat (Windows) to run
            - Includes signaling server and Prisma migrations
